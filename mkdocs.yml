site_name: TB Global Forecasting
site_description: Pipeline professionnel de séries temporelles pour la prévision épidémiologique de la tuberculose mondiale
site_author: Mohamed Ziani
site_url: https://votre-utilisateur.github.io/project_time_series/

repo_name: votre-utilisateur/project_time_series
repo_url: https://github.com/votre-utilisateur/project_time_series

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Accueil: index.md
  - Installation: installation.md
  - Utilisation: usage.md
  - Méthodologie: methodology.md
  - Résultats: results.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list

plugins:
  - search:
      lang: fr

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/votre-utilisateur

copyright: Copyright &copy; 2026 Mohamed Ziani
